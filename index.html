```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Strona z muzyką</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    color:white;
    background:url("tlo1.jpg") center center/cover no-repeat;
}

h1{
    font-size:60px;
    text-shadow:0 0 15px black;
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(6px);

    display:flex;
    justify-content:center;
    align-items:center;

    animation:fadeIn .8s ease;
}

.popup{

    width:360px;
    background:white;
    color:#222;
    border-radius:18px;
    overflow:hidden;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.5);

    animation:popup .8s ease;
}

.popup img{
    width:100%;
    display:block;
}

.popup h2{
    margin-top:15px;
}

.popup p{
    margin:15px;
    color:#555;
}

.popup button{

    margin-bottom:20px;

    padding:12px 30px;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    background:#4CAF50;

    color:white;

    transition:.3s;
}

.popup button:hover{

    transform:scale(1.08);

}

.hide{

    animation:fadeOut .6s forwards;

}

@keyframes popup{

    from{
        opacity:0;
        transform:scale(.6);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

@keyframes fadeOut{

    to{
        opacity:0;
        visibility:hidden;
    }

}
</style>

</head>

<body>

<h1>Witaj na mojej stronie!</h1>

<div id="overlay">

    <div class="popup">

        <img src="https://tenor.com/pl/view/angry-birds-hearing-red-hyperbaiter-angry-birds-peak-gif-13184220130857881670">

        <h2>Witaj!</h2>

        <p>Kliknij przycisk poniżej, aby rozpocząć.</p>

        <button onclick="startMusic()">
            ▶ Włącz muzykę
        </button>

    </div>

</div>

<audio id="music" loop>
    <source src="https://www.youtube.com/watch?v=8GYL6c_GTE0" type="audio/mpeg">
</audio>

<script>

function startMusic(){

    document.getElementById("music").play();

    document.getElementById("overlay").classList.add("hide");

    setTimeout(()=>{
        document.getElementById("overlay").remove();
    },600);

}

</script>

</body>
</html>
```
